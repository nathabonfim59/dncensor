name: CI

on:
  push:
    branches: ['*']
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [stable]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go test ./... -v

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build regular (glibc)
        run: |
          GOARCH=${{ matrix.arch }} GOOS=linux CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o dist/dncensor_${{ github.ref_name }}_linux_${{ matrix.arch }} .

      - name: Build musl (Alpine)
        run: |
          GOARCH=${{ matrix.arch }} GOOS=linux CGO_ENABLED=0 go build \
            -ldflags="-s -w" \
            -o dist/dncensor_${{ github.ref_name }}_linux_${{ matrix.arch }}_musl .

      - uses: actions/upload-artifact@v4
        with:
          name: binaries_${{ matrix.arch }}
          path: dist/*

  publish:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries_*
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dncensor_*
          generate_release_notes: true
